<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bgGrad" cx="20%" cy="0%" r="120%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="60%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2563EB" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#2563EB" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orbCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#60A5FA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>

    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.0"/>
      <stop offset="20%" stop-color="#60A5FA" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#2563EB" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="0.0"/>
    </linearGradient>

    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#1E293B" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Dot grid -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Accent orbs -->
  <circle cx="980" cy="520" r="380" fill="url(#orbBlue)"/>
  <circle cx="120" cy="80"  r="260" fill="url(#orbCyan)"/>

  <!-- Top-left monogram badge -->
  <g transform="translate(72, 72)">
    <rect x="0" y="0" rx="14" ry="14" width="60" height="60"
          fill="none" stroke="#334155" stroke-width="1.5"/>
    <text x="30" y="40" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="24" fill="#F8FAFC">
      SN
    </text>
  </g>

  <!-- Top-left eyebrow -->
  <text x="156" y="110"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="16" fill="#94A3B8"
        letter-spacing="3">
    PORTFOLIO  ·  CHICAGO, USA
  </text>

  <!-- Accent divider -->
  <rect x="72" y="170" width="220" height="2" fill="url(#accentLine)"/>

  <!-- Name -->
  <text x="72" y="280"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="104"
        fill="url(#nameGrad)" letter-spacing="-3">
    Shams Nahid K
  </text>

  <!-- Role -->
  <text x="72" y="350"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="44"
        fill="#60A5FA" letter-spacing="-1">
    Software Developer
  </text>

  <!-- Tagline -->
  <text x="72" y="408"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="26"
        fill="#CBD5E1" letter-spacing="-0.2">
    Resilient backend services  ·  Distributed systems  ·  Full-stack products
  </text>

  <!-- Bottom skill chips row -->
  <g font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="18" fill="#94A3B8">
    
      <g transform="translate(72, 484)">
        <rect width="97" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="48.5" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">Python</text>
      </g>
      <g transform="translate(181, 484)">
        <rect width="77" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="38.5" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">Java</text>
      </g>
      <g transform="translate(270, 484)">
        <rect width="87" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="43.5" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">React</text>
      </g>
      <g transform="translate(369, 484)">
        <rect width="77" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="38.5" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">gRPC</text>
      </g>
      <g transform="translate(458, 484)">
        <rect width="107" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="53.5" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">FastAPI</text>
      </g>
      <g transform="translate(577, 484)">
        <rect width="97" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="48.5" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">Docker</text>
      </g>
      <g transform="translate(686, 484)">
        <rect width="138" height="36" rx="18" ry="18"
              fill="#0F172A" stroke="#1E293B" stroke-width="1"/>
        <text x="69" y="24" text-anchor="middle"
              font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="15" fill="#CBD5E1">TypeScript</text>
      </g>
  </g>

  <!-- Bottom-left URL -->
  <text x="72" y="572"
        font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="18" fill="#64748B" letter-spacing="1">
    shamsnahidk.github.io
  </text>

  <!-- Bottom-right corner mark -->
  <g transform="translate(1128, 572)" text-anchor="end">
    <text font-family="ui-monospace, 'SF Mono', 'JetBrains Mono', Menlo, Consolas, monospace" font-size="18" fill="#475569" letter-spacing="2">
      2026  ·  CHI
    </text>
  </g>
</svg>